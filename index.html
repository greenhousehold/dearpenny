function getBabyAgeWeeks(dob){if(!dob)return null;const d=new Date(dob);if(isNaN(d))return null;return Math.floor((Date.now()-d.getTime())/(7*24*3600*1000));}

const defaultState={babyName:"Baby Girl",babyFullName:"",babyDOB:"",babyBirthWeight:"",feeding:[],diapers:[],symptoms:[],growth:[],milestones:[],sleep:[],reminderInterval:180,reminderEnabled:false,theme:"dark",sharedRoomId:null,lastSyncTs:null,contractions:[],cameraConfig:{},motionConfig:{sensitivity:40,autoEndSleep:true,notifyBoth:true,stirringAlert:false,awakeAlert:true,enabled:false},widgetOrder:[...DEFAULT_WIDGET_ORDER],doses:[],vaccDone:{},vaccSkipped:{},vaccDelayed:{},gClientId:"",gAccessToken:"",gSheetId:""};
function loadState(){try{const s=localStorage.getItem("dear_penny_v1");const d=s?{...defaultState,...JSON.parse(s)}:{...defaultState};if(!d.widgetOrder||!d.widgetOrder.length)d.widgetOrder=[...DEFAULT_WIDGET_ORDER];return d;}catch{return{...defaultState};}}
function saveState(s){try{localStorage.setItem("dear_penny_v1",JSON.stringify(s));}catch{}}

const fmtTime=iso=>new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDate=iso=>new Date(iso).toLocaleDateString([],{month:"short",day:"numeric"});
const fmtDateFull=iso=>new Date(iso).toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
const nowISO=()=>new Date().toISOString();
const minsAgo=iso=>Math.round((Date.now()-new Date(iso))/60000);
const hoursAgo=iso=>(minsAgo(iso)/60).toFixed(1);
const durationMins=(s,e)=>Math.round((new Date(e)-new Date(s))/60000);
const fmtDur=m=>m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
const fmtSecs=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

// ── Shared UI ─────────────────────────────────────────────────
function Card({children,T,style}){return <div style={{background:T.bgLayer1,border:`1px solid ${T.borderLight}`,borderRadius:SP.radiusLg,padding:"14px 16px",marginTop:12,...style}}>{children}</div>;}
function SL({children,T}){return <div style={{fontSize:SP.fontLabel,fontWeight:SP.weightBold,color:T.textSecondary,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:22,marginBottom:6}}>{children}</div>;}
function Btn({onClick,children,variant="accent",size="md",full,T,disabled}){
  const v={accent:{bg:T.accentBg,color:T.accentText,border:"none"},positive:{bg:T.positiveBg,color:T.positiveText,border:"none"},negative:{bg:T.negativeBg,color:T.negativeText,border:"none"},notice:{bg:T.noticeBg,color:T.noticeText,border:"none"},secondary:{bg:"transparent",color:T.textPrimary,border:`1px solid ${T.borderMid}`},quiet:{bg:T.subtleBg,color:T.textSecondary,border:"none"}}[variant]||{bg:T.accentBg,color:T.accentText,border:"none"};
  return <button onClick={onClick} disabled={disabled} style={{background:v.bg,color:v.color,border:v.border,borderRadius:SP.radiusPill,padding:size==="sm"?"6px 14px":"10px 20px",fontSize:size==="sm"?SP.fontSm:SP.fontMd,fontWeight:SP.weightBold,height:size==="sm"?"32px":SP.touchH,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,width:full?"100%":"auto",lineHeight:1}}>{children}</button>;
}

  const c={positive:{bg:"rgba(38,158,120,0.15)",c:T.positiveBg},negative:{bg:"rgba(215,55,63,0.15)",c:T.negativeBg},notice:{bg:"rgba(203,111,16,0.15)",c:T.noticeBg},info:{bg:"rgba(38,128,235,0.15)",c:T.accentBg},accent:{bg:T.selectedBg,c:T.accentBg}}[color]||{bg:T.tagBg,c:T.tagText};
  return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:SP.radiusPill,fontSize:"12px",fontWeight:SP.weightMed,background:c.bg,color:c.c,border:`1px solid ${c.c}22`}}>{children}</span>;

// ── Google Sheets ─────────────────────────────────────────────
async function gSheetsSync(state,token){
  const h={"Authorization":`Bearer ${token}`,"Content-Type":"application/json"};
  let id=state.gSheetId;
  if(!id){const r=await fetch("https://sheets.googleapis.com/v4/spreadsheets",{method:"POST",headers:h,body:JSON.stringify({properties:{title:"DearPenny Tracker"},sheets:[{properties:{title:"Feeding"}},{properties:{title:"Sleep"}},{properties:{title:"Symptoms"}},{properties:{title:"Growth"}},{properties:{title:"Diapers"}},{properties:{title:"Doses"}}]})});id=(await r.json()).spreadsheetId;}
  const rows=(arr,fn)=>arr.map(fn);
  const data=[
    {range:"Feeding!A1",values:[["Date","Time","Type","Side","Amount","Duration","Note"],...rows(state.feeding,f=>[fmtDate(f.ts),fmtTime(f.ts),f.type||"",f.side||"",f.amount||"",f.duration||"",f.note||""])]},
    {range:"Sleep!A1",values:[["Date","Start","End","Duration","Note"],...rows(state.sleep.filter(s=>s.end),s=>[fmtDate(s.ts),fmtTime(s.ts),fmtTime(s.end),fmtDur(durationMins(s.ts,s.end)),s.note||""])]},
    {range:"Symptoms!A1",values:[["Date","Time","Type","Severity","Temp","Note"],...rows(state.symptoms,s=>[fmtDate(s.ts),fmtTime(s.ts),s.type,s.severity,s.temp||"",s.note||""])]},
    {range:"Growth!A1",values:[["Date","Weight","Height","Head","Note"],...rows(state.growth,g=>[fmtDate(g.ts),g.weight||"",g.height||"",g.head||"",g.note||""])]},
    {range:"Diapers!A1",values:[["Date","Time","Type"],...rows(state.diapers,d=>[fmtDate(d.ts),fmtTime(d.ts),d.type])]},
    {range:"Doses!A1",values:[["Date","Time","Medicine","Amount","Unit","Reason","Given By"],...rows(state.doses||[],d=>[fmtDate(d.ts),fmtTime(d.ts),d.name,d.amount,d.unit,d.reason||"",d.givenBy||""])]},
  ];
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values:batchUpdate`,{method:"POST",headers:h,body:JSON.stringify({valueInputOption:"RAW",data})});
  return{sheetId:id,url:`https://docs.google.com/spreadsheets/d/${id}`};
}

// ── App ───────────────────────────────────────────────────────
function App(){
  const [state,setState]=useState(loadState);
  const [tab,setTab]=useState("dashboard");
  const [editMode,setEditMode]=useState(false);
  const [onboarded,setOnboarded]=useState(()=>{try{return !!JSON.parse(localStorage.getItem("dear_penny_v1"))?.onboarded;}catch{return false;}});
  const reminderRef=useRef(null);
  const T=S2[state.theme||"dark"];
  useEffect(()=>saveState(state),[state]);
  useEffect(()=>{
    if(reminderRef.current)clearInterval(reminderRef.current);
    if(!state.reminderEnabled)return;
    reminderRef.current=setInterval(()=>{const last=state.feeding[0];if(!last)return;if(minsAgo(last.ts)>=state.reminderInterval&&"Notification"in window&&Notification.permission==="granted")new Notification(`${state.babyName} — Time to feed!`,{body:`Last fed ${hoursAgo(last.ts)}h ago.`});},60000);
    return()=>clearInterval(reminderRef.current);
  },[state.reminderEnabled,state.reminderInterval,state.feeding,state.babyName]);
  const update=useCallback((k,v)=>setState(s=>({...s,[k]:v})),[]);
  const addEntry=useCallback((k,e)=>setState(s=>({...s,[k]:[{id:Date.now(),ts:nowISO(),...e},...s[k]]})),[]);
  const removeEntry=useCallback((k,id)=>setState(s=>({...s,[k]:s[k].filter(e=>e.id!==id)})),[]);
  const completeOnboarding=({babyName,dob})=>{setState(s=>({...s,babyName:babyName||"Baby Girl",babyDOB:dob||"",onboarded:true}));setOnboarded(true);};
  if(!onboarded)return <Onboarding onComplete={completeOnboarding} T={T}/>;
  return(
    <div style={{fontFamily:"-apple-system,system-ui,sans-serif",maxWidth:520,margin:"0 auto",paddingBottom:90,background:T.bgBase,minHeight:"100vh",color:T.textPrimary}}>
      <header style={{background:T.statusBar,borderBottom:`1px solid ${T.borderLight}`,padding:"14px 18px 12px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <img src="./coin.png" alt="DearPenny" style={{width:32,height:32,borderRadius:"50%",objectFit:"cover"}}/>
          <div style={{flex:1}}><div style={{fontWeight:SP.weightBold,fontSize:SP.fontLg,color:T.textPrimary}}>DearPenny</div><div style={{fontSize:"11px",color:T.textSecondary}}>{state.babyFullName||state.babyName}</div></div>
          <button onClick={()=>setTab("settings")} style={{background:tab==="settings"?`${T.accentBg}22`:T.subtleBg,border:`1px solid ${tab==="settings"?T.accentBg:T.borderLight}`,borderRadius:SP.radiusPill,padding:"7px 12px",fontSize:SP.fontSm,cursor:"pointer",color:tab==="settings"?T.accentBg:T.textSecondary,fontWeight:SP.weightBold,height:"36px"}}>⚙</button>
          <button onClick={()=>setEditMode(v=>!v)} style={{background:editMode?`${T.accentBg}22`:T.subtleBg,border:`1px solid ${editMode?T.accentBg:T.borderLight}`,borderRadius:SP.radiusPill,padding:"7px 12px",fontSize:SP.fontSm,cursor:"pointer",color:editMode?T.accentBg:T.textSecondary,fontWeight:SP.weightBold,height:"36px"}}>{editMode?"✓":"✏"}</button>
        </div>
      </header>
      <div style={{padding:"0 16px"}}>
        {tab==="dashboard"   &&<Dashboard state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T} editMode={editMode}/>}
        {tab==="feeding"     &&<Feeding state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
        {tab==="sleep"       &&<Sleep state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T}/>}
        {tab==="camera"      &&<CameraTab state={state} update={update} T={T}/>}
        {tab==="medicine"    &&<MedicineTab state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T}/>}
        {tab==="symptoms"    &&<Symptoms state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
        {tab==="growth"      &&<Growth state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
        {tab==="history"     &&<History state={state} T={T}/>}
        {tab==="doctor"      &&<DoctorVisit state={state} T={T}/>}
        {tab==="contraction" &&<ContractionTimer state={state} update={update} T={T}/>}
        {tab==="settings"    &&<SettingsTab state={state} update={update} T={T}/>}
      </div>
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:T.statusBar,borderTop:`1px solid ${T.borderLight}`}}>
        <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",padding:"6px 0 env(safe-area-inset-bottom,8px)"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>{setTab(n.id);if(n.id!=="dashboard")setEditMode(false);}}
              style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"4px 0",color:tab===n.id?T.accentBg:T.textSecondary,minWidth:"18.18%",flexShrink:0,position:"relative"}}>
              {tab===n.id&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:"2px",background:T.accentBg,borderRadius:"0 0 2px 2px"}}/>}
              <span style={{fontSize:16}}>{n.icon}</span>
              <span style={{fontSize:"9px",fontWeight:tab===n.id?SP.weightBold:SP.weightReg}}>{n.label}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

// ── Onboarding ────────────────────────────────────────────────
function Onboarding({onComplete,T}){
  const [step,setStep]=useState(0),[babyName,setBabyName]=useState(""),[dob,setDob]=useState(""),[animIn,setAnimIn]=useState(true);

// ── Settings Tab ──────────────────────────────────────────────

    </Card>
    <SL T={T}>Camera settings</SL>
    <CameraSettingsCard state={state} update={update} T={T}/>
  </div>);

// ── Dashboard ─────────────────────────────────────────────────

// ── Feeding ───────────────────────────────────────────────────
function Feeding({state,addEntry,removeEntry,T}){

// ── History ───────────────────────────────────────────────────
const TFS=[{label:"1M",days:30},{label:"3M",days:90},{label:"6M",days:180},{label:"1Y",days:365}];
const METRICS=[{id:"feeding",label:"Feeding"},{id:"sleep",label:"Sleep"},{id:"weight",label:"Weight"}];
function History({state,T}){
  const [tf,setTf]=useState(0),[metric,setMetric]=useState("feeding"),[hover,setHover]=useState(null);
  const svgRef=useRef();const W=460,H=200,PAD={t:20,r:16,b:36,l:46};
  const cutoff=Date.now()-TFS[tf].days*864e5;
  const points=(()=>{if(metric==="feeding"){const b={};state.feeding.filter(f=>new Date(f.ts)>cutoff).forEach(f=>{const d=fmtDate(f.ts);b[d]=(b[d]||0)+1;});return Object.entries(b).map(([d,v])=>({label:d,v,ts:new Date(d).getTime()})).sort((a,b)=>a.ts-b.ts);}if(metric==="sleep"){const b={};state.sleep.filter(s=>s.end&&new Date(s.ts)>cutoff).forEach(s=>{const d=fmtDate(s.ts);b[d]=(b[d]||0)+durationMins(s.ts,s.end);});return Object.entries(b).map(([d,v])=>({label:d,v:Math.round(v/60*10)/10,ts:new Date(d).getTime()})).sort((a,b)=>a.ts-b.ts);}return state.growth.filter(g=>g.weight&&new Date(g.ts)>cutoff).map(g=>({label:fmtDate(g.ts),v:parseFloat(g.weight),ts:new Date(g.ts).getTime()})).sort((a,b)=>a.ts-b.ts);})();
  const minV=points.length?Math.min(...points.map(p=>p.v)):0,maxV=points.length?Math.max(...points.map(p=>p.v)):1,range=maxV-minV||1;
  const gW=W-PAD.l-PAD.r,gH=H-PAD.t-PAD.b;
  const px=i=>PAD.l+(i/Math.max(points.length-1,1))*gW,py=v=>PAD.t+gH-((v-minV)/range)*gH;
  const path=points.map((p,i)=>`${i===0?"M":"L"}${px(i).toFixed(1)},${py(p.v).toFixed(1)}`).join(" ");
  const area=points.length>1?`${path} L${px(points.length-1).toFixed(1)},${(PAD.t+gH).toFixed(1)} L${PAD.l},${(PAD.t+gH).toFixed(1)} Z`:"";
  const handleMove=e=>{if(!svgRef.current||!points.length)return;const rect=svgRef.current.getBoundingClientRect();const mx=(e.clientX-rect.left)*(W/rect.width);let best=0,bestD=Infinity;points.forEach((p,i)=>{const d=Math.abs(px(i)-mx);if(d<bestD){bestD=d;best=i;}});setHover(best);};
  const yL=[0,.25,.5,.75,1].map(t=>({v:minV+t*range,y:PAD.t+gH-t*gH}));const unit=metric==="feeding"?"feeds":metric==="sleep"?"hrs":"kg";
  return(<div><SL T={T}>History</SL><div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap",alignItems:"center"}}><Segmented T={T} options={METRICS.map(m=>({id:m.id,label:m.label}))} value={metric} onChange={v=>{setMetric(v);setHover(null);}}/><div style={{marginLeft:"auto",display:"flex",gap:4}}>{TFS.map((t,i)=><Chip key={t.label} label={t.label} selected={tf===i} onClick={()=>{setTf(i);setHover(null);}} T={T}/>)}</div></div><Card T={T} style={{padding:"16px 8px 8px",marginTop:10}}>{hover!==null&&points[hover]&&<div style={{textAlign:"center",marginBottom:10}}><span style={{fontSize:SP.fontXl,fontWeight:SP.weightBold,color:T.accentBg}}>{points[hover].v} {unit}</span><span style={{fontSize:SP.fontSm,color:T.textSecondary,marginLeft:10}}>{points[hover].label}</span></div>}{points.length<2?<div style={{textAlign:"center",color:T.textSecondary,fontSize:SP.fontMd,padding:"40px 0"}}>Not enough data yet.</div>:(<svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",cursor:"crosshair",touchAction:"none"}} onMouseMove={handleMove} onMouseLeave={()=>setHover(null)} onTouchMove={e=>{e.preventDefault();handleMove(e.touches[0]);}} onTouchEnd={()=>setHover(null)}><defs><linearGradient id="ag2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={T.chartLine} stopOpacity="0.3"/><stop offset="100%" stopColor={T.chartLine} stopOpacity="0.02"/></linearGradient></defs>{yL.map((l,i)=><g key={i}><line x1={PAD.l} y1={l.y} x2={W-PAD.r} y2={l.y} stroke={T.borderLight} strokeWidth="0.5" strokeDasharray="4,3"/><text x={PAD.l-6} y={l.y+4} fontSize="10" fill={T.textSecondary} textAnchor="end">{l.v.toFixed(metric==="weight"?1:0)}</text></g>)}{area&&<path d={area} fill="url(#ag2)"/>}{path&&<path d={path} fill="none" stroke={T.chartLine} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>}{points.map((p,i)=><circle key={i} cx={px(i)} cy={py(p.v)} r={hover===i?6:3} fill={hover===i?T.accentBg:T.bgLayer1} stroke={T.chartLine} strokeWidth={hover===i?2.5:1.5}/>)}{hover!==null&&points[hover]&&<line x1={px(hover)} y1={PAD.t} x2={px(hover)} y2={PAD.t+gH} stroke={T.accentBg} strokeWidth="1" strokeDasharray="4,3" opacity="0.7"/>}{(()=>{const step=Math.max(1,Math.floor(points.length/5));return points.filter((_,i)=>i%step===0||i===points.length-1).map(p=>{const orig=points.indexOf(p);return <text key={orig} x={px(orig)} y={H-4} fontSize="10" fill={T.textSecondary} textAnchor="middle">{p.label}</text>;});})()}</svg>)}</Card></div>);
}

// ── Doctor Visit ──────────────────────────────────────────────
function DoctorVisit({state,T}){
  const last7=d=>new Date(d)>new Date(Date.now()-7*864e5);
  const rF=state.feeding.filter(f=>last7(f.ts)),rS=state.sleep.filter(s=>s.end&&last7(s.ts)),rSym=state.symptoms.filter(s=>last7(s.ts)),rD=state.diapers.filter(d=>last7(d.ts));
  const lg=state.growth[0],avgF=(rF.length/7).toFixed(1),avgSl=rS.length?(rS.reduce((a,s)=>a+durationMins(s.ts,s.end),0)/rS.length/60).toFixed(1):0;
  const exportTxt=()=>{let t=`DEAR PENNY — DOCTOR VISIT SUMMARY\n${fmtDateFull(nowISO())}\n\nBABY: ${state.babyFullName||state.babyName}`;if(state.babyDOB)t+=`\nDOB: ${state.babyDOB}`;if(lg){t+=`\n\nLATEST MEASUREMENTS`;if(lg.weight)t+=`\nWeight: ${lg.weight}`;if(lg.height)t+=`\nHeight: ${lg.height}`;if(lg.head)t+=`\nHead: ${lg.head}`;}t+=`\n\nLAST 7 DAYS\nFeedings: ${rF.length} (avg ${avgF}/day)\nSleep: ${rS.length} (avg ${avgSl}h)\nDiapers: ${rD.length}`;if(rSym.length){t+="\n\nSYMPTOMS";rSym.forEach(s=>{t+=`\n- ${s.type} (${s.severity}) ${fmtDate(s.ts)}`;if(s.temp)t+=` ${s.temp}`;if(s.note)t+=` — ${s.note}`;});}const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([t],{type:"text/plain"}));a.download="doctor_visit.txt";a.click();};
  return(<div><SL T={T}>Doctor visit summary</SL><Card T={T}><div style={{fontSize:SP.fontLg,fontWeight:SP.weightBold,color:T.textPrimary,marginBottom:10}}>👶 {state.babyFullName||state.babyName}</div>{state.babyDOB&&<div style={{fontSize:SP.fontSm,color:T.textSecondary,marginBottom:4}}>DOB: {state.babyDOB}</div>}{state.babyBirthWeight&&<div style={{fontSize:SP.fontSm,color:T.textSecondary}}>Birth weight: {state.babyBirthWeight}kg</div>}</Card>{lg&&<Card T={T}><div style={{fontSize:SP.fontSm,fontWeight:SP.weightBold,color:T.textSecondary,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Latest measurements</div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{lg.weight&&<Tag T={T} color="info">⚖ {lg.weight}</Tag>}{lg.height&&<Tag T={T} color="positive">↕ {lg.height}</Tag>}{lg.head&&<Tag T={T}>◎ {lg.head}</Tag>}</div></Card>}<Card T={T}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><StatCard T={T} label="Feedings" value={rF.length} sub={`avg ${avgF}/day`} color="blue"/><StatCard T={T} label="Diapers" value={rD.length} sub="changes" color="amber"/><StatCard T={T} label="Sleep" value={rS.length} sub={`avg ${avgSl}h`} color="purple"/><StatCard T={T} label="Symptoms" value={rSym.length} sub={rSym.length?"logged":"none"} color={rSym.length?"red":"gray"}/></div></Card>{rSym.length>0&&<Card T={T}><div style={{fontSize:SP.fontSm,fontWeight:SP.weightBold,color:T.textSecondary,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>Symptoms</div>{rSym.map(s=><div key={s.id} style={{paddingBottom:10,marginBottom:10,borderBottom:`1px solid ${T.borderLight}`}}><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}><Tag T={T} color="negative">{s.type}</Tag><Tag T={T} color={s.severity==="mild"?"positive":s.severity==="moderate"?"notice":"negative"}>{s.severity}</Tag>{s.temp&&<Tag T={T}>{s.temp}</Tag>}</div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtDate(s.ts)} at {fmtTime(s.ts)}{s.note?` · ${s.note}`:""}</div></div>)}</Card>}<div style={{display:"flex",gap:10,marginTop:16}}><Btn T={T} onClick={exportTxt} variant="accent">Download summary</Btn><Btn T={T} onClick={()=>window.print()} variant="secondary">Print</Btn></div></div>);
}

// ── Contraction Timer ─────────────────────────────────────────
function ContractionTimer({state,update,T}){
  const contractions=state.contractions||[];
  const [active,setActive]=useState(false),[startTs,setStartTs]=useState(null),[elapsed,setElapsed]=useState(0);
  const tRef=useRef();
  useEffect(()=>{if(!active){clearInterval(tRef.current);return;}tRef.current=setInterval(()=>setElapsed(Math.round((Date.now()-startTs)/1000)),500);return()=>clearInterval(tRef.current);},[active,startTs]);
  const start=()=>{const ts=Date.now();setStartTs(ts);setActive(true);setElapsed(0);};
  const stop=()=>{if(!startTs)return;const dur=Math.round((Date.now()-startTs)/1000);const prev=contractions[contractions.length-1];const gap=prev?Math.round((startTs-new Date(prev.ts).getTime()-prev.duration*1000)/1000):null;update("contractions",[...contractions,{id:Date.now(),ts:new Date(startTs).toISOString(),duration:dur,gap}]);setActive(false);setStartTs(null);setElapsed(0);};
  const avgDur=contractions.length?Math.round(contractions.slice(-5).reduce((a,c)=>a+c.duration,0)/Math.min(contractions.length,5)):0;
  const avgGap=contractions.filter(c=>c.gap).length?Math.round(contractions.filter(c=>c.gap).slice(-5).reduce((a,c)=>a+c.gap,0)/Math.min(contractions.filter(c=>c.gap).length,5)):0;
  const freq511=avgGap>0&&avgGap<=300&&avgDur>=45;
  return(<div><SL T={T}>Contraction timer</SL><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:4,marginBottom:4}}>Tap when a contraction starts, tap again when it ends.</div>{freq511&&<div style={{background:`${T.negativeBg}22`,border:`1.5px solid ${T.negativeBg}`,borderRadius:SP.radiusMd,padding:"12px 16px",marginTop:12,color:T.negativeBg,fontSize:SP.fontSm,fontWeight:SP.weightBold}}>⚠ 5-1-1 pattern detected!</div>}<Card T={T} style={{textAlign:"center",padding:"24px 16px"}}><div style={{fontSize:56,fontWeight:SP.weightBold,color:active?T.negativeBg:T.accentBg,marginBottom:6,lineHeight:1}}>{fmtSecs(elapsed)}</div><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginBottom:20}}>{active?"In progress...":"Tap to start"}</div><button onClick={active?stop:start} style={{width:130,height:130,borderRadius:"50%",border:`3px solid ${active?T.negativeBg:T.accentBg}`,background:active?`${T.negativeBg}18`:`${T.accentBg}18`,cursor:"pointer",fontSize:SP.fontLg,fontWeight:SP.weightBold,color:active?T.negativeBg:T.accentBg}}>{active?"STOP":"START"}</button></Card>{contractions.length>0&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}><StatCard T={T} label="Total" value={contractions.length} sub="contractions" color="red"/><StatCard T={T} label="Avg duration" value={avgDur>0?`${avgDur}s`:"—"} sub="last 5" color="amber"/><StatCard T={T} label="Avg gap" value={avgGap>0?fmtSecs(avgGap):"—"} sub="between" color="purple"/><StatCard T={T} label="5-1-1" value={freq511?"Yes":"Not yet"} sub={freq511?"Call provider!":"Keep timing"} color={freq511?"red":"gray"}/></div><SL T={T}>Recent</SL>{contractions.slice(-5).reverse().map((c,i)=>(<Card key={c.id} T={T} style={{display:"flex",justifyContent:"space-between",padding:"12px 16px"}}><div><div style={{display:"flex",gap:6,marginBottom:4}}><Tag T={T} color="negative">{c.duration}s</Tag>{c.gap&&<Tag T={T}>{fmtSecs(c.gap)} gap</Tag>}</div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtTime(c.ts)}</div></div><span style={{fontSize:SP.fontSm,color:T.textSecondary}}>#{contractions.length-i}</span></Card>))}<div style={{marginTop:12}}><Btn T={T} onClick={()=>update("contractions",[])} variant="quiet" size="sm">Clear all</Btn></div></>}</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
