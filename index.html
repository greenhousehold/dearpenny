function getBabyAgeWeeks(dob){if(!dob)return null;const d=new Date(dob);if(isNaN(d))return null;return Math.floor((Date.now()-d.getTime())/(7*24*3600*1000));}

const defaultState={babyName:"Baby Girl",babyFullName:"",babyDOB:"",babyBirthWeight:"",feeding:[],diapers:[],symptoms:[],growth:[],milestones:[],sleep:[],reminderInterval:180,reminderEnabled:false,theme:"dark",sharedRoomId:null,lastSyncTs:null,contractions:[],cameraConfig:{},motionConfig:{sensitivity:40,autoEndSleep:true,notifyBoth:true,stirringAlert:false,awakeAlert:true,enabled:false},widgetOrder:[...DEFAULT_WIDGET_ORDER],hiddenWidgets:[],doses:[],vaccDone:{},vaccSkipped:{},vaccDelayed:{},gClientId:"",gAccessToken:"",gSheetId:"",doctorVisits:[]};

function loadState(){try{const s=localStorage.getItem("dear_penny_v1");const d=s?{...defaultState,...JSON.parse(s)}:{...defaultState};if(!d.widgetOrder||!d.widgetOrder.length)d.widgetOrder=[...DEFAULT_WIDGET_ORDER];if(!d.hiddenWidgets)d.hiddenWidgets=[];if(!d.doctorVisits)d.doctorVisits=[];return d;}catch{return{...defaultState};}}
function saveState(s){try{localStorage.setItem("dear_penny_v1",JSON.stringify(s));}catch{}}

// #4 Native notification bridge
function sendNotification(title,body){
  if(window.AndroidNotif){window.AndroidNotif.show(title,body);return;}
  if("Notification"in window&&Notification.permission==="granted"){new Notification(title,{body});}
}

const fmtTime=iso=>new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
const fmtDate=iso=>new Date(iso).toLocaleDateString([],{month:"short",day:"numeric"});
const fmtDateFull=iso=>new Date(iso).toLocaleDateString([],{month:"short",day:"numeric",year:"numeric"});
const nowISO=()=>new Date().toISOString();
const minsAgo=iso=>Math.round((Date.now()-new Date(iso))/60000);
const hoursAgo=iso=>(minsAgo(iso)/60).toFixed(1);
const timeAgo=iso=>{
  const m=minsAgo(iso);
  if(m<1)return"just now";
  if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60),rm=m%60;
  if(h<24)return rm>0?`${h}h ${rm}m ago`:`${h}h ago`;
  const d=Math.floor(h/24),rh=h%24;
  return rh>0?`${d}d ${rh}h ago`:`${d}d ago`;
};
const durationMins=(s,e)=>Math.round((new Date(e)-new Date(s))/60000);
const fmtDur=m=>m>=60?`${Math.floor(m/60)}h ${m%60}m`:`${m}m`;
const fmtSecs=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

// ── Shared UI ─────────────────────────────────────────────────
function Card({children,T,style}){return <div style={{background:T.bgLayer1,border:`1px solid ${T.borderLight}`,borderRadius:SP.radiusLg,padding:"14px 16px",marginTop:12,...style}}>{children}</div>;}
function SL({children,T}){return <div style={{fontSize:SP.fontLabel,fontWeight:SP.weightBold,color:T.textSecondary,letterSpacing:"0.08em",textTransform:"uppercase",marginTop:22,marginBottom:6}}>{children}</div>;}
function Btn({onClick,children,variant="accent",size="md",full,T,disabled}){
const v={accent:{bg:T.accentBg,color:T.accentText,border:"none"},positive:{bg:T.positiveBg,color:T.positiveText,border:"none"},negative:{bg:T.negativeBg,color:T.negativeText,border:"none"},notice:{bg:T.noticeBg,color:T.noticeText,border:"none"},secondary:{bg:"transparent",color:T.textPrimary,border:`1px solid ${T.borderMid}`},quiet:{bg:T.subtleBg,color:T.textSecondary,border:"none"}}[variant]||{bg:T.accentBg,color:T.accentText,border:"none"};
return <button onClick={onClick} disabled={disabled} style={{background:v.bg,color:v.color,border:v.border,borderRadius:SP.radiusPill,padding:size==="sm"?"6px 14px":"10px 20px",fontSize:size==="sm"?SP.fontSm:SP.fontMd,fontWeight:SP.weightBold,height:size==="sm"?"32px":SP.touchH,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,width:full?"100%":"auto",lineHeight:1}}>{children}</button>;
}
function Tag({children,T,color}){
const c={positive:{bg:"rgba(38,158,120,0.15)",c:T.positiveBg},negative:{bg:"rgba(215,55,63,0.15)",c:T.negativeBg},notice:{bg:"rgba(203,111,16,0.15)",c:T.noticeBg},info:{bg:"rgba(38,128,235,0.15)",c:T.accentBg},accent:{bg:T.selectedBg,c:T.accentBg}}[color]||{bg:T.tagBg,c:T.tagText};
return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:SP.radiusPill,fontSize:"12px",fontWeight:SP.weightMed,background:c.bg,color:c.c,border:`1px solid ${c.c}22`}}>{children}</span>;
}
function StatCard({label,value,sub,color,T}){
const ac={blue:T.accentBg,green:T.positiveBg,amber:T.noticeBg,red:T.negativeBg,purple:"#9b59b6",gray:T.textSecondary}[color]||T.accentBg;
return <div style={{background:T.bgLayer2,borderRadius:SP.radiusMd,padding:"14px",border:`1px solid ${T.borderLight}`}}><div style={{fontSize:SP.fontLabel,color:ac,fontWeight:SP.weightBold,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div><div style={{fontSize:SP.fontXl,fontWeight:SP.weightBold,color:T.textPrimary,lineHeight:1.1}}>{value}</div>{sub&&<div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:4}}>{sub}</div>}</div>;
}
function Inp({value,onChange,placeholder,type="text",step,style,T}){
return <input value={value} onChange={onChange} type={type} step={step} placeholder={placeholder} style={{background:T.inputBg,border:`1px solid ${T.inputBorder}`,borderRadius:SP.radiusMd,padding:"10px 12px",fontSize:SP.fontMd,color:T.textPrimary,width:"100%",boxSizing:"border-box",height:SP.touchH,outline:"none",...style}}/>;
}
function Segmented({options,value,onChange,T}){
return <div style={{display:"flex",background:T.bgLayer2,borderRadius:SP.radiusPill,padding:"3px",gap:"2px",border:`1px solid ${T.borderLight}`}}>{options.map(({id,label})=><button key={id} onClick={()=>onChange(id)} style={{flex:1,padding:"7px 12px",borderRadius:SP.radiusPill,border:"none",cursor:"pointer",background:value===id?T.accentBg:"transparent",color:value===id?T.accentText:T.textSecondary,fontSize:SP.fontSm,fontWeight:SP.weightBold}}>{label}</button>)}</div>;
}
function Chip({label,selected,onClick,T,color}){

return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:SP.radiusPill,cursor:"pointer",fontSize:SP.fontSm,fontWeight:selected?SP.weightBold:SP.weightReg,background:selected?`${ac}22`:T.subtleBg,color:selected?ac:T.textSecondary,border:selected?`1.5px solid ${ac}`:`1px solid ${T.borderLight}`}}>{selected?"✓ ":""}{label}</button>;
}

// ── Google Sheets ─────────────────────────────────────────────
async function gSheetsSync(state,token){
const h={"Authorization":`Bearer ${token}`,"Content-Type":"application/json"};
let id=state.gSheetId;
if(!id){const r=await fetch("https://sheets.googleapis.com/v4/spreadsheets",{method:"POST",headers:h,body:JSON.stringify({properties:{title:"DearPenny Tracker"},sheets:[{properties:{title:"Feeding"}},{properties:{title:"Sleep"}},{properties:{title:"Symptoms"}},{properties:{title:"Growth"}},{properties:{title:"Diapers"}},{properties:{title:"Doses"}},{properties:{title:"DoctorVisits"}}]})});id=(await r.json()).spreadsheetId;}
const rows=(arr,fn)=>arr.map(fn);
const data=[
{range:"Feeding!A1",values:[["Date","Time","Type","Side","Amount","Duration","Note"],...rows(state.feeding,f=>[fmtDate(f.ts),fmtTime(f.ts),f.type||"",f.side||"",f.amount||"",f.duration||"",f.note||""])]},
{range:"Sleep!A1",values:[["Date","Start","End","Duration","Note"],...rows(state.sleep.filter(s=>s.end),s=>[fmtDate(s.ts),fmtTime(s.ts),fmtTime(s.end),fmtDur(durationMins(s.ts,s.end)),s.note||""])]},
{range:"Symptoms!A1",values:[["Date","Time","Type","Severity","Temp","Note"],...rows(state.symptoms,s=>[fmtDate(s.ts),fmtTime(s.ts),s.type,s.severity,s.temp||"",s.note||""])]},
{range:"Growth!A1",values:[["Date","Weight","Height","Head","Note"],...rows(state.growth,g=>[fmtDate(g.ts),g.weight||"",g.height||"",g.head||"",g.note||""])]},
{range:"Diapers!A1",values:[["Date","Time","Type"],...rows(state.diapers,d=>[fmtDate(d.ts),fmtTime(d.ts),d.type])]},
{range:"Doses!A1",values:[["Date","Time","Medicine","Amount","Unit","Reason","Given By"],...rows(state.doses||[],d=>[fmtDate(d.ts),fmtTime(d.ts),d.name,d.amount,d.unit,d.reason||"",d.givenBy||""])]},
{range:"DoctorVisits!A1",values:[["Date","Doctor","Reason","Notes","Next Appt"],...rows(state.doctorVisits||[],v=>[fmtDateFull(v.ts),v.doctor||"",v.reason||"",v.notes||"",v.nextAppt||""])]},
];
await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values:batchUpdate`,{method:"POST",headers:h,body:JSON.stringify({valueInputOption:"RAW",data})});
return{sheetId:id,url:`https://docs.google.com/spreadsheets/d/${id}`};
}

// ── App ───────────────────────────────────────────────────────
function App(){
const [state,setState]=useState(loadState);
const [tab,setTab]=useState("dashboard");
const [editMode,setEditMode]=useState(false);
const [onboarded,setOnboarded]=useState(()=>{try{return !!JSON.parse(localStorage.getItem("dear_penny_v1"))?.onboarded;}catch{return false;}});
const reminderRef=useRef(null);
const T=S2[state.theme||"dark"];

useEffect(()=>saveState(state),[state]);

useEffect(()=>{
if(reminderRef.current)clearInterval(reminderRef.current);
if(!state.reminderEnabled)return;
reminderRef.current=setInterval(()=>{const last=state.feeding[0];if(!last)return;if(minsAgo(last.ts)>=state.reminderInterval){sendNotification(`${state.babyName} — Time to feed!`,`Last fed ${hoursAgo(last.ts)}h ago.`);}},60000);
return()=>clearInterval(reminderRef.current);
},[state.reminderEnabled,state.reminderInterval,state.feeding,state.babyName]);

const update=useCallback((k,v)=>setState(s=>({...s,[k]:v})),[]);
const addEntry=useCallback((k,e)=>setState(s=>({...s,[k]:[{id:Date.now(),ts:nowISO(),...e},...s[k]]})),[]);
const removeEntry=useCallback((k,id)=>setState(s=>({...s,[k]:s[k].filter(e=>e.id!==id)})),[]);
const completeOnboarding=({babyName,dob})=>{setState(s=>({...s,babyName:babyName||"Baby Girl",babyDOB:dob||"",onboarded:true}));setOnboarded(true);};

if(!onboarded)return <Onboarding onComplete={completeOnboarding} T={T}/>;

return(
<div className="app-wrap" style={{fontFamily:"-apple-system,system-ui,sans-serif",maxWidth:520,margin:"0 auto",paddingBottom:90,background:T.bgBase,minHeight:"100vh",color:T.textPrimary}}>
{/* #8 Tap header to go home */}
<header onClick={()=>setTab("dashboard")} style={{background:T.statusBar,borderBottom:`1px solid ${T.borderLight}`,padding:"14px 18px 12px",position:"sticky",top:0,zIndex:10,cursor:"pointer"}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<img src="./coin.png" alt="DearPenny" style={{width:32,height:32,borderRadius:"50%",objectFit:"cover"}}/>
<div style={{flex:1}}><div style={{fontWeight:SP.weightBold,fontSize:SP.fontLg,color:T.textPrimary}}>DearPenny</div><div style={{fontSize:"11px",color:T.textSecondary}}>{state.babyFullName||state.babyName}</div></div>
<button onClick={e=>{e.stopPropagation();setTab("settings");}} style={{background:tab==="settings"?`${T.accentBg}22`:T.subtleBg,border:`1px solid ${tab==="settings"?T.accentBg:T.borderLight}`,borderRadius:SP.radiusPill,padding:"7px 12px",fontSize:SP.fontSm,cursor:"pointer",color:tab==="settings"?T.accentBg:T.textSecondary,fontWeight:SP.weightBold,height:"36px"}}>⚙</button>
<button onClick={e=>{e.stopPropagation();setEditMode(v=>!v);}} style={{background:editMode?`${T.accentBg}22`:T.subtleBg,border:`1px solid ${editMode?T.accentBg:T.borderLight}`,borderRadius:SP.radiusPill,padding:"7px 12px",fontSize:SP.fontSm,cursor:"pointer",color:editMode?T.accentBg:T.textSecondary,fontWeight:SP.weightBold,height:"36px"}}>{editMode?"✓":"✏"}</button>
</div>
</header>
<div className="app-scroll" style={{padding:"0 16px"}}>
{tab==="dashboard"&&<Dashboard state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T} editMode={editMode}/>}
{tab==="feeding"&&<Feeding state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
{tab==="sleep"&&<Sleep state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T}/>}
{tab==="camera"&&<CameraTab state={state} update={update} T={T}/>}
{tab==="medicine"&&<MedicineTab state={state} addEntry={addEntry} removeEntry={removeEntry} update={update} T={T}/>}
{tab==="symptoms"&&<Symptoms state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
{tab==="growth"&&<Growth state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
{tab==="history"&&<History state={state} T={T}/>}
{tab==="doctor"&&<DoctorVisit state={state} addEntry={addEntry} removeEntry={removeEntry} T={T}/>}
{tab==="contraction"&&<ContractionTimer state={state} update={update} T={T}/>}
{tab==="settings"&&<SettingsTab state={state} update={update} T={T}/>}
</div>
{/* #9 Fixed nav icon sizes via className */}
<nav style={{position:"fixed",bottom:0,left:0,right:0,background:T.statusBar,borderTop:`1px solid ${T.borderLight}`}}>
<div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",padding:"6px 0 env(safe-area-inset-bottom,8px)"}}>
{NAV.map(n=>(
<button key={n.id} onClick={()=>{setTab(n.id);if(n.id!=="dashboard")setEditMode(false);}}
style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",padding:"4px 0",color:tab===n.id?T.accentBg:T.textSecondary,minWidth:"18.18%",flexShrink:0,position:"relative"}}>
{tab===n.id&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:"2px",background:T.accentBg,borderRadius:"0 0 2px 2px"}}/>}
<span className="nav-icon">{n.icon}</span>
<span className="nav-label">{n.label}</span>

// ── Settings Tab ──────────────────────────────────────────────
function SettingsTab({state,update,T}){
const [notifStatus,setNotifStatus]=useState("Notification" in window?Notification.permission:"unsupported");
const [clientId,setClientId]=useState(state.gClientId||"");
const [sheetStatus,setSheetStatus]=useState(state.gSheetId?"success":"idle");
const [sheetUrl,setSheetUrl]=useState(state.gSheetId?`https://docs.google.com/spreadsheets/d/${state.gSheetId}`:"");
const [syncing,setSyncing]=useState(false);
// #5 Shared sync state now lives in Settings
const [showJoin,setShowJoin]=useState(false),[roomInput,setRoomInput]=useState(""),[syncMsg,setSyncMsg]=useState("");

const reqNotif=async()=>{const p=await Notification.requestPermission();setNotifStatus(p);if(p==="granted")update("reminderEnabled",true);};
const createRoom=()=>{const id=Math.random().toString(36).slice(2,8).toUpperCase();update("sharedRoomId",id);setSyncMsg(`Room created! Code: ${id}`);};
const joinRoom=()=>{const id=roomInput.trim().toUpperCase();if(!id)return;update("sharedRoomId",id);setSyncMsg(`Joined ${id}!`);};

useEffect(()=>{
const handler=async(e)=>{
if(e.data?.type==="DEARPENNY_OAUTH"&&e.data.accessToken){
const token=e.data.accessToken;update("gAccessToken",token);setSheetStatus("syncing");setSyncing(true);
try{const{sheetId,url}=await gSheetsSync({...state,gClientId:clientId},token);update("gSheetId",sheetId);update("gClientId",clientId);setSheetUrl(url);setSheetStatus("success");}catch{setSheetStatus("error");}
setSyncing(false);
}
};
window.addEventListener("message",handler);

// Also poll localStorage for token from Custom Tab fallback
const poll=setInterval(()=>{
try{
const raw=localStorage.getItem("dearpenny_oauth_token");
if(!raw)return;
const {token,ts}=JSON.parse(raw);
if(Date.now()-ts>120000)return; // ignore if older than 2 min
localStorage.removeItem("dearpenny_oauth_token");
clearInterval(poll);
update("gAccessToken",token);
setSheetStatus("syncing");setSyncing(true);
gSheetsSync({...state,gClientId:clientId},token)
  .then(({sheetId,url})=>{update("gSheetId",sheetId);update("gClientId",clientId);setSheetUrl(url);setSheetStatus("success");})
  .catch(()=>setSheetStatus("error"))
  .finally(()=>setSyncing(false));
}catch(e){}
},1000);

return()=>{window.removeEventListener("message",handler);clearInterval(poll);};
},[state,clientId]);

const connectGoogle=()=>{
if(!clientId.trim()){setSheetStatus("noclientid");return;}
// Use Google Identity Services token client instead of manual OAuth URL
// This avoids the 403 disallowed_useragent and implicit flow deprecation
const tokenClient=window.google.accounts.oauth2.initTokenClient({
client_id:clientId.trim(),
scope:"https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file",
prompt:"select_account",
callback:async(resp)=>{
if(resp.error){setSheetStatus("error");return;}
const token=resp.access_token;
update("gAccessToken",token);
update("gClientId",clientId.trim());
setSheetStatus("syncing");setSyncing(true);
try{const{sheetId,url}=await gSheetsSync({...state,gClientId:clientId},token);update("gSheetId",sheetId);setSheetUrl(url);setSheetStatus("success");}
catch{setSheetStatus("error");}
setSyncing(false);
}
});
tokenClient.requestAccessToken();
setSheetStatus("waiting");
};
const syncNow=async()=>{
if(!state.gAccessToken){setSheetStatus("notoken");return;}
setSyncing(true);setSheetStatus("syncing");
try{const{sheetId,url}=await gSheetsSync(state,state.gAccessToken);update("gSheetId",sheetId);setSheetUrl(url);setSheetStatus("success");}catch{setSheetStatus("error");}
setSyncing(false);
};

return(<div>
<SL T={T}>Baby details</SL><BabySetup state={state} update={update} T={T}/>

<Card T={T}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary}}>Theme</div><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:2}}>{state.theme==="dark"?"Dark mode":"Light mode"}</div></div><button onClick={()=>update("theme",state.theme==="dark"?"light":"dark")} style={{padding:"8px 18px",borderRadius:SP.radiusPill,border:`1px solid ${T.borderMid}`,cursor:"pointer",fontSize:SP.fontSm,background:T.subtleBg,color:T.textSecondary,fontWeight:SP.weightBold}}>{state.theme==="dark"?"☀ Light":"🌙 Dark"}</button></div></Card>
<SL T={T}>Feeding reminder</SL>
<Card T={T}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:notifStatus==="granted"?12:0}}>
<div><div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary}}>Remind me to feed</div><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:2}}>Every {state.reminderInterval} min ({(state.reminderInterval/60).toFixed(1)}h)</div></div>
{notifStatus==="unsupported"&&<Tag T={T} color="notice">Not supported</Tag>}
{notifStatus==="default"&&<Btn T={T} onClick={reqNotif} variant="accent" size="sm">Enable</Btn>}
{notifStatus==="denied"&&<Tag T={T} color="negative">Blocked</Tag>}
{notifStatus==="granted"&&<button onClick={()=>update("reminderEnabled",!state.reminderEnabled)} style={{padding:"8px 18px",borderRadius:SP.radiusPill,border:`1.5px solid ${state.reminderEnabled?T.positiveBg:T.borderMid}`,cursor:"pointer",fontSize:SP.fontSm,background:state.reminderEnabled?`${T.positiveBg}22`:"transparent",color:state.reminderEnabled?T.positiveBg:T.textSecondary,fontWeight:SP.weightBold}}>{state.reminderEnabled?"● On":"○ Off"}</button>}
</div>
{notifStatus==="granted"&&<div><input type="range" min="30" max="360" step="15" value={state.reminderInterval} onChange={e=>update("reminderInterval",Number(e.target.value))} style={{width:"100%",accentColor:T.accentBg,marginBottom:4}}/><div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:T.textSecondary}}><span>30m</span><span>1h</span><span>2h</span><span>3h</span><span>4h</span><span>6h</span></div></div>}
</Card>

{/* #5 Shared Sync moved fully into Settings */}
<SL T={T}>Shared sync</SL>
<Card T={T}>
{!state.sharedRoomId?(<div><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginBottom:12}}>Share real-time data with your partner.</div><div style={{display:"flex",gap:8,marginBottom:8}}><Btn T={T} onClick={createRoom} variant="accent">Create room</Btn><Btn T={T} onClick={()=>setShowJoin(!showJoin)} variant="secondary">Join room</Btn></div>{showJoin&&<div style={{display:"flex",gap:8,marginTop:8}}><Inp T={T} value={roomInput} onChange={e=>setRoomInput(e.target.value)} placeholder="Enter room code"/><Btn T={T} onClick={joinRoom} variant="positive">Join</Btn></div>}{syncMsg&&<div style={{fontSize:SP.fontSm,color:T.accentBg,marginTop:8,fontWeight:SP.weightBold}}>{syncMsg}</div>}</div>):(<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary}}>Room: <span style={{color:T.accentBg,fontFamily:"monospace",letterSpacing:3}}>{state.sharedRoomId}</span></div><div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:2}}>Active</div></div><Btn T={T} onClick={()=>update("sharedRoomId",null)} variant="quiet" size="sm">Leave</Btn></div>)}
</Card>

<SL T={T}>Google Sheets sync</SL>

<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}><Btn T={T} onClick={connectGoogle} variant="accent">Connect Google</Btn>{state.gAccessToken&&<Btn T={T} onClick={syncNow} variant="positive" disabled={syncing}>{syncing?"Syncing…":"Sync now"}</Btn>}</div>
{sheetStatus==="waiting"&&<div style={{fontSize:SP.fontSm,color:T.noticeBg}}>Sign-in window opened…</div>}

<SL T={T}>Camera settings</SL>

</div>);
}

const visibleOrder=order.filter(id=>!hidden.includes(id));

// #6 Drag state
const dragId=useRef(null);
const longPressTimer=useRef(null);
const [draggingId,setDraggingId]=useState(null);
const [dragOverId,setDragOverId]=useState(null);

const moveWidget=(i,dir)=>{const next=[...order];const t=i+dir;if(t<0||t>=next.length)return;[next[i],next[t]]=[next[t],next[i]];update("widgetOrder",next);};
const toggleHide=(id)=>{const h=hidden.includes(id)?hidden.filter(x=>x!==id):[...hidden,id];update("hiddenWidgets",h);};

const onTouchStart=(id,e)=>{
  longPressTimer.current=setTimeout(()=>{dragId.current=id;setDraggingId(id);},400);
};
const onTouchEnd=()=>{clearTimeout(longPressTimer.current);if(!dragId.current)return;if(dragOverId&&dragOverId!==dragId.current){const next=[...order];const fi=next.indexOf(dragId.current),ti=next.indexOf(dragOverId);if(fi>-1&&ti>-1){next.splice(fi,1);next.splice(ti,0,dragId.current);update("widgetOrder",next);}}dragId.current=null;setDraggingId(null);setDragOverId(null);};

Tag>}</div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtDate(d.ts)} at {fmtTime(d.ts)}{d.reason?` · ${d.reason}`:""}</div></div><button onClick={()=>removeEntry("doses",d.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDisabled,fontSize:20,padding:"0 0 0 8px"}}>×</button></Card>))}</>}
{subTab==="vacc"&&<>
<div style={{marginTop:12,background:T.bgLayer2,borderRadius:SP.radiusMd,padding:"14px 16px",border:`1px solid ${T.borderLight}`}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary}}>Progress</div><Tag T={T} color={doneCount===totalCount?"positive":"info"}>{doneCount} / {totalCount}</Tag></div>
<div style={{background:T.bgLayer3,borderRadius:4,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${(doneCount/totalCount)*100}%`,background:T.positiveBg,borderRadius:4,transition:"width 0.4s"}}/></div>
{babyAgeWeeks!==null&&<div style={{fontSize:SP.fontSm,color:T.textSecondary,marginTop:8}}>{state.babyName}: <strong style={{color:T.textPrimary}}>{babyAgeWeeks<52?`${babyAgeWeeks}w`:`${Math.floor(babyAgeWeeks/52)}y ${babyAgeWeeks%52}w`}</strong>{overdue.length>0&&<span style={{color:T.negativeBg,fontWeight:SP.weightBold}}> · {overdue.length} overdue</span>}{delayedCount>0&&<span style={{color:T.noticeBg,fontWeight:SP.weightBold}}> · {delayedCount} delayed</span>}{skippedCount>0&&<span style={{color:T.textSecondary}}> · {skippedCount} skipped</span>}</div>}
</div>
{overdue.length>0&&<><SL T={T}>Overdue</SL>{Object.entries(groupByAge(overdue)).map(([age,vaxes])=>(<Card key={age} T={T} style={{borderLeft:`3px solid ${T.negativeBg}`,paddingLeft:12}}><div style={{fontSize:SP.fontLabel,color:T.negativeBg,fontWeight:SP.weightBold,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>⚠ {age}</div>{vaxes.map(v=><VaccRow key={v.id} v={v} T={T} onMark={n=>markVacc(v.id,n)} onSkip={r=>skipVacc(v.id,r)} onDelay={(u,r)=>delayVacc(v.id,u,r)} note={vaccNote[v.id]||""} setNote={n=>setVaccNote(nv=>({...nv,[v.id]:n}))}/>)}</Card>))}</>}
{next.length>0&&<><SL T={T}>Upcoming</SL>{Object.entries(groupByAge(next.slice(0,16))).map(([age,vaxes])=>(<Card key={age} T={T}><div style={{fontSize:SP.fontLabel,color:T.textSecondary,fontWeight:SP.weightBold,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.06em"}}>{age}</div>{vaxes.map(v=><VaccRow key={v.id} v={v} T={T} onMark={n=>markVacc(v.id,n)} onSkip={r=>skipVacc(v.id,r)} onDelay={(u,r)=>delayVacc(v.id,u,r)} note={vaccNote[v.id]||""} setNote={n=>setVaccNote(nv=>({...nv,[v.id]:n}))}/>)}</Card>))}</>}
{delayedCount>0&&<><SL T={T}>Delayed</SL>{VAX_SCHEDULE.filter(v=>vaccDelayed[v.id]).map(v=>(<Card key={v.id} T={T} style={{display:"flex",justifyContent:"space-between",padding:"10px 16px"}}><div><div style={{display:"flex",gap:6,marginBottom:3}}><Tag T={T} color="notice">⏸ {v.name}</Tag><Tag T={T}>{v.dose}</Tag></div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{vaccDelayed[v.id].until?`Reschedule: ${vaccDelayed[v.id].until}`:fmtDate(vaccDelayed[v.id].ts)}</div></div><div style={{display:"flex",gap:6}}><Btn T={T} onClick={()=>markVacc(v.id,"")} variant="positive" size="sm">✓</Btn><Btn T={T} onClick={()=>undelayVacc(v.id)} variant="quiet" size="sm">↩</Btn></div></Card>))}</>}
{skippedCount>0&&<><SL T={T}>Skipped</SL>{VAX_SCHEDULE.filter(v=>vaccSkipped[v.id]).map(v=>(<Card key={v.id} T={T} style={{display:"flex",justifyContent:"space-between",padding:"10px 16px"}}><div><div style={{display:"flex",gap:6,marginBottom:3}}><Tag T={T}>⊘ {v.name}</Tag><Tag T={T}>{v.dose}</Tag></div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtDate(vaccSkipped[v.id].ts)}</div></div><Btn T={T} onClick={()=>unskipVacc(v.id)} variant="quiet" size="sm">↩</Btn></Card>))}</>}
{doneCount>0&&<><SL T={T}>Completed ({doneCount})</SL>{VAX_SCHEDULE.filter(v=>vaccDone[v.id]).map(v=>(<Card key={v.id} T={T} style={{display:"flex",justifyContent:"space-between",padding:"10px 16px"}}><div><div style={{display:"flex",gap:6,marginBottom:3}}><Tag T={T} color="positive">✓ {v.name}</Tag><Tag T={T}>{v.dose}</Tag></div><div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtDate(vaccDone[v.id].ts)}</div></div><button onClick={()=>unmarkVacc(v.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDisabled,fontSize:20}}>×</button></Card>))}</>}
</>}
</div>);
}

function VaccRow({v,T,onMark,onSkip,onDelay,note,setNote}){
const [mode,setMode]=useState(null),[until,setUntil]=useState(""),[reason,setReason]=useState("");

<div style={{flexShrink:0}}>{mode===null?(<div style={{display:"flex",gap:6}}><Btn T={T} onClick={()=>setMode("give")} variant="positive" size="sm">✓</Btn><Btn T={T} onClick={()=>setMode("delay")} variant="notice" size="sm">⏸</Btn><Btn T={T} onClick={()=>setMode("skip")} variant="secondary" size="sm">⊘</Btn></div>):(<Btn T={T} onClick={cancel} variant="quiet" size="sm">Cancel</Btn>)}</div>
</div>
{mode==="give"&&<div style={{marginTop:10,display:"flex",gap:8}}><Inp T={T} value={note} onChange={e=>setNote(e.target.value)} placeholder="Notes (optional)"/><Btn T={T} onClick={()=>{onMark(note);cancel();}} variant="positive" size="sm">Save</Btn></div>}
{mode==="delay"&&<div style={{marginTop:10}}><Inp T={T} value={until} onChange={e=>setUntil(e.target.value)} type="date" style={{marginBottom:8}}/><Inp T={T} value={reason} onChange={e=>setReason(e.target.value)} placeholder="Reason (optional)" style={{marginBottom:8}}/><div style={{display:"flex",gap:8}}><Btn T={T} onClick={()=>{onDelay(until,reason);cancel();}} variant="notice" size="sm">Delay</Btn></div></div>}
{mode==="skip"&&<div style={{marginTop:10}}><Inp T={T} value={reason} onChange={e=>setReason(e.target.value)} placeholder="Reason (optional)" style={{marginBottom:8}}/><div style={{display:"flex",gap:8}}><Btn T={T} onClick={()=>{onSkip(reason);cancel();}} variant="negative" size="sm">Skip</Btn></div></div>}
</div>);
}

on onClick={()=>removeEntry("symptoms",s.id)} style={{background:"none",border:"none",cursor:"pointer",color:T.textDisabled,fontSize:20,padding:"0 0 0 8px"}}>×</button></Card>))}</div>);
}

function Growth({state,addEntry,removeEntry,T}){

// ── History ───────────────────────────────────────────────────
function History({state,T}){
const days=7,now=Date.now();
const feedByDay=Array(days).fill(0).map((_,i)=>{const d=new Date(now-i*86400000);const ds=fmtDate(d.toISOString());return{day:ds,count:state.feeding.filter(f=>fmtDate(f.ts)===ds).length};}).reverse();
const maxF=Math.max(...feedByDay.map(d=>d.count),1);
return(<div><SL T={T}>Feedings — last 7 days</SL><Card T={T}><div style={{display:"flex",alignItems:"flex-end",gap:6,height:120,paddingTop:8}}>{feedByDay.map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{fontSize:"11px",color:T.textSecondary,fontWeight:SP.weightBold}}>{d.count||""}</div><div style={{width:"100%",background:d.count?T.accentBg:T.bgLayer3,borderRadius:"4px 4px 0 0",height:`${(d.count/maxF)*80}px`,minHeight:d.count?4:0,transition:"height 0.3s"}}/><div style={{fontSize:"10px",color:T.textDisabled,textAlign:"center"}}>{d.day.replace(/[a-z]/g,"")}</div></div>))}</div></Card><SL T={T}>Sleep — last 7 days</SL><Card T={T}>{Array(days).fill(0).map((_,i)=>{const d=new Date(now-i*86400000);const ds=fmtDate(d.toISOString());const mins=state.sleep.filter(s=>s.end&&fmtDate(s.ts)===ds).reduce((a,s)=>a+durationMins(s.ts,s.end),0);return(<div key={i} style={{display:"flex",justifyContent:"space-between",paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${T.borderLight}`}}><span style={{fontSize:SP.fontSm,color:T.textSecondary}}>{ds}</span><span style={{fontSize:SP.fontSm,color:T.textPrimary,fontWeight:SP.weightBold}}>{mins?fmtDur(mins):"—"}</span></div>);}).reverse()}</Card></div>);
}

// ── Doctor Visit ──────────────────────────────────────────────
function DoctorVisit({state,addEntry,removeEntry,T}){
const visits=state.doctorVisits||[];
const lastVisit=visits[0];
const lastVisitTs=lastVisit?(lastVisit.visitDate||lastVisit.ts):null;

// Activity since last visit (or all time if no visits)
const sinceTs=lastVisitTs?new Date(lastVisitTs):null;
const sinceFeedings=sinceTs?state.feeding.filter(f=>new Date(f.ts)>sinceTs):state.feeding;
const sinceDiapers=sinceTs?state.diapers.filter(d=>new Date(d.ts)>sinceTs):state.diapers;
const sinceSymptoms=sinceTs?state.symptoms.filter(s=>new Date(s.ts)>sinceTs):state.symptoms;
const sinceSleep=sinceTs?state.sleep.filter(s=>s.end&&new Date(s.ts)>sinceTs):state.sleep.filter(s=>s.end);
const totalSleepMins=sinceSleep.reduce((a,s)=>a+durationMins(s.ts,s.end),0);

// Countdown to next appt
const nextApptDate=lastVisit?.nextAppt?new Date(lastVisit.nextAppt):null;
const daysToNext=nextApptDate?Math.ceil((nextApptDate-Date.now())/(1000*3600*24)):null;

// Time since last visit (live ticking)
const [,tick]=useState(0);
useEffect(()=>{const t=setInterval(()=>tick(n=>n+1),60000);return()=>clearInterval(t);},[]);
const timeSinceLabel=()=>{
  if(!lastVisitTs)return"Never";
  const mins=minsAgo(lastVisitTs),h=Math.floor(mins/60),d=Math.floor(h/24);
  if(d>0)return`${d}d ${h%24}h ago`;
  if(h>0)return`${h}h ${mins%60}m ago`;
  return`${mins}m ago`;
};

// Form state
const [doctor,setDoctor]=useState("");
const [reason,setReason]=useState("");
const [notes,setNotes]=useState("");
const [nextAppt,setNextAppt]=useState("");
const [visitDate,setVisitDate]=useState(new Date().toISOString().slice(0,16));
const [showForm,setShowForm]=useState(false);
// Collapsed history state — all collapsed by default except most recent
const [expanded,setExpanded]=useState({});
const toggleExpand=id=>setExpanded(e=>({...e,[id]:!e[id]}));

// Print summary (since last visit)
const printSummary=()=>{
const win=window.open("","_blank");if(!win)return;
const sinceLabel=lastVisitTs?`since ${fmtDateFull(lastVisitTs)}`:"all time";
const html=`<!DOCTYPE html><html><head><title>DearPenny — Doctor Summary</title>
<style>body{font-family:sans-serif;padding:24px;max-width:600px;}h1{font-size:20px;}h2{font-size:15px;color:#555;margin-top:20px;}p{margin:4px 0 8px;}table{width:100%;border-collapse:collapse;margin-top:8px;}th,td{text-align:left;padding:7px 8px;border-bottom:1px solid #eee;}th{font-size:11px;color:#888;text-transform:uppercase;}</style>
</head><body>
<h1>DearPenny — Doctor Visit Summary</h1>
<p><strong>Baby:</strong> ${state.babyFullName||state.babyName}</p>
<p><strong>Period:</strong> ${sinceLabel}</p>
<p><strong>Generated:</strong> ${new Date().toLocaleString()}</p>
${lastVisit?`<h2>Last Visit</h2><p><strong>Date:</strong> ${fmtDateFull(lastVisitTs)}<br/><strong>Doctor:</strong> ${lastVisit.doctor||"—"}<br/><strong>Reason:</strong> ${lastVisit.reason||"—"}<br/><strong>Notes:</strong> ${lastVisit.notes||"—"}</p>`:""}
${nextApptDate?`<p><strong>Next appointment:</strong> ${lastVisit.nextAppt}</p>`:""}
<h2>Feedings (${sinceFeedings.length})</h2>
<table><tr><th>Date</th><th>Type</th><th>Details</th></tr>
${sinceFeedings.slice(0,20).map(f=>`<tr><td>${fmtDate(f.ts)} ${fmtTime(f.ts)}</td><td>${f.type}</td><td>${f.side||f.amount||f.food||"—"}</td></tr>`).join("")}
</table>
<h2>Diapers (${sinceDiapers.length})</h2>
<table><tr><th>Date</th><th>Time</th><th>Type</th></tr>
${sinceDiapers.slice(0,20).map(d=>`<tr><td>${fmtDate(d.ts)}</td><td>${fmtTime(d.ts)}</td><td>${d.type}</td></tr>`).join("")}
</table>
<h2>Symptoms (${sinceSymptoms.length})</h2>
<table><tr><th>Date</th><th>Type</th><th>Severity</th><th>Temp</th><th>Note</th></tr>
${sinceSymptoms.map(s=>`<tr><td>${fmtDate(s.ts)}</td><td>${s.type}</td><td>${s.severity}</td><td>${s.temp||"—"}</td><td>${s.note||"—"}</td></tr>`).join("")}
</table>
<h2>Sleep — ${fmtDur(totalSleepMins)} total (${sinceSleep.length} sessions)</h2>
<table><tr><th>Date</th><th>Start</th><th>End</th><th>Duration</th></tr>
${sinceSleep.slice(0,20).map(s=>`<tr><td>${fmtDate(s.ts)}</td><td>${fmtTime(s.ts)}</td><td>${fmtTime(s.end)}</td><td>${fmtDur(durationMins(s.ts,s.end))}</td></tr>`).join("")}
</table>
<h2>Growth</h2>
<table><tr><th>Date</th><th>Weight</th><th>Height</th><th>Head</th></tr>
${state.growth.slice(0,5).map(g=>`<tr><td>${fmtDateFull(g.ts)}</td><td>${g.weight||"—"}kg</td><td>${g.height||"—"}cm</td><td>${g.head||"—"}cm</td></tr>`).join("")}
</table>
</body></html>`;
win.document.write(html);win.document.close();win.print();
};

const downloadCSV=()=>{
const rows=[["Date","Doctor","Reason","Notes","Next Appointment"],...visits.map(v=>[fmtDateFull(v.visitDate||v.ts),v.doctor||"",v.reason||"",v.notes||"",v.nextAppt||""])];
const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");a.href=url;a.download=`dearpenny-visits-${new Date().toISOString().slice(0,10)}.csv`;a.click();
URL.revokeObjectURL(url);
};

const logVisit=()=>{
if(!doctor&&!reason)return;
addEntry("doctorVisits",{doctor,reason,notes,nextAppt,visitDate});
setDoctor("");setReason("");setNotes("");setNextAppt("");setVisitDate(new Date().toISOString().slice(0,16));setShowForm(false);
};

return(<div>
<SL T={T}>Since last visit</SL>

{/* Time since + countdown */}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:6}}>
<StatCard T={T} label="Last visit" value={timeSinceLabel()} sub={lastVisitTs?fmtDateFull(lastVisitTs):"No visits yet"} color="blue"/>
{daysToNext!==null
  ?<StatCard T={T} label="Next appt" value={daysToNext>0?`${daysToNext}d away`:"Today!"} sub={lastVisit.nextAppt} color={daysToNext<=3?"red":"green"}/>
  :<StatCard T={T} label="Next appt" value="Not set" sub="Log a visit to set" color="gray"/>}
</div>

{/* Activity summary since last visit */}
<Card T={T}>
<div style={{fontSize:SP.fontLabel,color:T.textSecondary,fontWeight:SP.weightBold,marginBottom:10,textTransform:"uppercase",letterSpacing:"0.06em"}}>{lastVisitTs?`Activity since ${fmtDateFull(lastVisitTs)}`:"All activity"}</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
{[["⊕ Feedings",sinceFeedings.length,"blue"],["◈ Diapers",sinceDiapers.length,"amber"],["♥ Symptoms",sinceSymptoms.length,sinceSymptoms.length>0?"red":"green"],["◑ Sleep",fmtDur(totalSleepMins),"purple"]].map(([label,val,color])=>{
const ac={blue:T.accentBg,amber:T.noticeBg,red:T.negativeBg,green:T.positiveBg,purple:"#9b59b6"}[color]||T.accentBg;
return(<div key={label} style={{background:T.bgLayer2,borderRadius:SP.radiusMd,padding:"10px 12px",border:`1px solid ${T.borderLight}`}}>
<div style={{fontSize:"11px",color:ac,fontWeight:SP.weightBold,marginBottom:4}}>{label}</div>
<div style={{fontSize:SP.fontLg,fontWeight:SP.weightBold,color:T.textPrimary}}>{val}</div>
</div>);
})}
</div>
{sinceSymptoms.length>0&&<div style={{marginTop:10}}>
<div style={{fontSize:SP.fontLabel,color:T.negativeBg,fontWeight:SP.weightBold,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>Symptoms</div>
{sinceSymptoms.map(s=>(
<div key={s.id} style={{fontSize:SP.fontSm,color:T.textSecondary,paddingBottom:6,marginBottom:6,borderBottom:`1px solid ${T.borderLight}`}}>
<span style={{color:s.severity==="severe"?T.negativeBg:s.severity==="moderate"?T.noticeBg:T.positiveBg,fontWeight:SP.weightBold}}>{s.type}</span>
{` · ${s.severity}`}{s.temp?` · 🌡 ${s.temp}°C`:""}{s.note?` · ${s.note}`:""}
<span style={{color:T.textDisabled,marginLeft:6}}>{fmtDate(s.ts)}</span>
</div>
))}
</div>}
</Card>

{/* Print / Download */}
<div style={{display:"flex",gap:8,marginTop:12}}>
<Btn T={T} onClick={printSummary} variant="secondary">🖨 Print summary</Btn>
<Btn T={T} onClick={downloadCSV} variant="secondary">⬇ Download CSV</Btn>
</div>

{/* Log visit form */}
<div style={{marginTop:12}}>
{!showForm
  ?<Btn T={T} onClick={()=>setShowForm(true)} variant="accent" full>+ Log doctor visit</Btn>
  :<Card T={T}>
<div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary,marginBottom:12}}>New visit</div>
<div style={{display:"grid",gap:10,marginBottom:10}}>
{[["Visit date & time",visitDate,setVisitDate,"","datetime-local"],["Doctor name",doctor,setDoctor,"Dr. Smith","text"],["Reason for visit",reason,setReason,"e.g. 6-month checkup","text"],["Notes",notes,setNotes,"Doctor's notes, advice…","text"],["Next appointment",nextAppt,setNextAppt,"","date"]].map(([label,val,setter,ph,type])=>(
<div key={label}><div style={{fontSize:SP.fontLabel,color:T.textSecondary,fontWeight:SP.weightBold,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div><Inp T={T} value={val} onChange={e=>setter(e.target.value)} placeholder={ph} type={type}/></div>
))}
</div>
<div style={{display:"flex",gap:8}}><Btn T={T} onClick={logVisit} variant="positive">Save visit</Btn><Btn T={T} onClick={()=>setShowForm(false)} variant="quiet" size="sm">Cancel</Btn></div>
</Card>}
</div>

{/* Visit history — collapsed by default */}
{visits.length>0&&<><SL T={T}>Visit history ({visits.length})</SL>
{visits.map((v,i)=>{
const isOpen=i===0||!!expanded[v.id];
const prev=visits[i+1];
const sinceDays=prev?Math.floor((new Date(v.visitDate||v.ts)-new Date(prev.visitDate||prev.ts))/(1000*3600*24)):null;
// activity between this and previous visit
const vTs=new Date(v.visitDate||v.ts);
const prevTs=prev?new Date(prev.visitDate||prev.ts):null;
const vFeedings=state.feeding.filter(f=>{const t=new Date(f.ts);return prevTs?t>prevTs&&t<=vTs:t<=vTs;});
const vDiapers=state.diapers.filter(d=>{const t=new Date(d.ts);return prevTs?t>prevTs&&t<=vTs:t<=vTs;});
const vSymptoms=state.symptoms.filter(s=>{const t=new Date(s.ts);return prevTs?t>prevTs&&t<=vTs:t<=vTs;});
return(<Card key={v.id} T={T} style={{marginTop:8}}>
{/* Collapsed header — always visible */}
<div onClick={()=>toggleExpand(v.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
<div>
<div style={{fontSize:SP.fontMd,fontWeight:SP.weightBold,color:T.textPrimary}}>{v.doctor||"Doctor visit"}</div>
<div style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtDateFull(v.visitDate||v.ts)}{sinceDays!==null?` · ${sinceDays}d after previous`:""}</div>
</div>
<div style={{display:"flex",alignItems:"center",gap:8}}>
{v.nextAppt&&!isOpen&&<Tag T={T} color="info">Next: {v.nextAppt}</Tag>}
<span style={{color:T.textDisabled,fontSize:18}}>{isOpen?"▲":"▼"}</span>
</div>
</div>
{/* Expanded details */}
{isOpen&&<div style={{marginTop:10,borderTop:`1px solid ${T.borderLight}`,paddingTop:10}}>
{v.reason&&<div style={{fontSize:SP.fontSm,color:T.textSecondary,marginBottom:4}}><strong>Reason:</strong> {v.reason}</div>}
{v.notes&&<div style={{fontSize:SP.fontSm,color:T.textSecondary,marginBottom:4}}><strong>Notes:</strong> {v.notes}</div>}
{v.nextAppt&&<div style={{marginBottom:8}}><Tag T={T} color="info">Next appt: {v.nextAppt}</Tag></div>}
<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:vSymptoms.length>0?6:8}}>
<Tag T={T} color="info">{vFeedings.length} feedings</Tag>
<Tag T={T} color="notice">{vDiapers.length} diapers</Tag>
{vSymptoms.length>0&&<Tag T={T} color="negative">{vSymptoms.length} symptoms</Tag>}
</div>
{vSymptoms.length>0&&<div style={{marginBottom:8}}>{vSymptoms.map(s=>(
<div key={s.id} style={{fontSize:SP.fontSm,color:T.textSecondary,paddingBottom:4,marginBottom:4,borderBottom:`1px solid ${T.borderLight}`}}>
<span style={{color:s.severity==="severe"?T.negativeBg:s.severity==="moderate"?T.noticeBg:T.positiveBg,fontWeight:SP.weightBold}}>{s.type}</span>
{` · ${s.severity}`}{s.temp?` · 🌡 ${s.temp}°C`:""}{s.note?` · ${s.note}`:""}
<span style={{color:T.textDisabled,marginLeft:6}}>{fmtDate(s.ts)}</span>
</div>
))}</div>}
<button onClick={e=>{e.stopPropagation();removeEntry("doctorVisits",v.id);}} style={{background:"none",border:"none",cursor:"pointer",color:T.negativeBg,fontSize:SP.fontSm,padding:0}}>Delete visit</button>
</div>}
</Card>);
})}
</>}
{visits.length===0&&<div style={{fontSize:SP.fontSm,color:T.textDisabled,marginTop:16,textAlign:"center"}}>No visits logged yet. Log your first visit to start tracking.</div>}
</div>);
}

// ── Contraction Timer ─────────────────────────────────────────
function ContractionTimer({state,update,T}){
const cons=state.contractions||[];
const [active,setActive]=useState(null),[,tick]=useState(0);
useEffect(()=>{if(!active)return;const t=setInterval(()=>tick(n=>n+1),1000);return()=>clearInterval(t);},[active]);
const start=()=>setActive({start:Date.now()});
const stop=()=>{if(!active)return;const dur=Math.round((Date.now()-active.start)/1000);update("contractions",[{id:Date.now(),ts:nowISO(),duration:dur},...cons]);setActive(null);};
const avgGap=cons.length>1?Math.round(cons.slice(0,-1).reduce((a,c,i)=>{const next=cons[i+1];return a+(new Date(c.ts)-new Date(next.ts))/1000;},0)/(cons.length-1)):null;
return(<div><SL T={T}>Contraction timer</SL><Card T={T} style={{textAlign:"center",padding:"24px 16px"}}>
{!active?<Btn T={T} onClick={start} variant="accent" full>Start contraction</Btn>:<><div style={{fontSize:44,fontWeight:SP.weightBold,color:T.negativeBg,marginBottom:16}}>{fmtSecs(Math.round((Date.now()-active.start)/1000))}</div><Btn T={T} onClick={stop} variant="notice" full>Stop</Btn></>}
</Card>
{cons.length>0&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:12}}><StatCard T={T} label="Contractions" value={cons.length} color="red"/><StatCard T={T} label="Avg gap" value={avgGap?fmtSecs(avgGap):"—"} color="amber"/></div><SL T={T}>Log</SL>{cons.slice(0,10).map(c=>(<Card key={c.id} T={T} style={{display:"flex",justifyContent:"space-between",padding:"10px 16px"}}><div><Tag T={T} color="negative">{fmtSecs(c.duration)}</Tag></div><span style={{fontSize:SP.fontSm,color:T.textSecondary}}>{fmtTime(c.ts)}</span></Card>))}</>}
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
